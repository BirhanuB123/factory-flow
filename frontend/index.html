<!doctype html>
<html lang="en" data-ui-lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Integra-ERP</title>
  <meta name="description" content="Integra ERP - Shop floor production, inventory, BOMs, orders and clients" />
  <meta name="author" content="Integra ERP" />
  <link rel="icon" type="image/png" href="/favicon.png" />
  <link rel="apple-touch-icon" href="/favicon.png" />


  <meta property="og:title" content="Integra ERP" />
  <meta property="og:description" content="Shop floor production, inventory, BOMs, orders and clients" />
  <meta property="og:type" content="website" />

  <meta name="twitter:card" content="summary_large_image" />
  <script>
    try {
      var raw = localStorage.getItem("erp-settings");
      if (raw) {
        var s = JSON.parse(raw);
        if (s.darkMode) document.documentElement.classList.add("dark");
        var ul = s.uiLanguage;
        if (ul === "am" || ul === "om" || ul === "en") {
          document.documentElement.lang = ul;
          document.documentElement.setAttribute("data-ui-lang", ul);
        }
      }
    } catch (e) {}
  </script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
